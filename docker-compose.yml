services:

  db:
    image: postgres:18-alpine
    restart: always
    shm_size: 128mb
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    env_file: .env
    ports:
      - 127.0.0.1:5432:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 127.0.0.1:8081:8080
  
  frontend:
    build: ./frontend
    restart: always
    ports:
      - 80:80
  
  backend:
    build: ./backend
    env_file: .env
    ports:
      - 127.0.0.1:8080:8080
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mcticket
  
  nlp:
    build: ./nlp
    restart: always
    ports:
      - 127.0.0.1:8000:8000

volumes:
  pgdata:
