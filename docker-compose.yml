services:

  db:
    image: postgres:18-alpine
    restart: always
    shm_size: 128mb
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 127.0.0.1:5432:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 127.0.0.1:8080:8080
  
  frontend:
    build: ./frontend
    restart: always
    ports:
      - 127.0.0.1:80:80

volumes:
  pgdata:
