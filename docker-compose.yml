services:

  db:
    image: postgres:18-alpine
    restart: always
    shm_size: 128mb
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
      - ./helpdesk_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./02_seed_users.sql:/docker-entrypoint-initdb.d/02_seed_users.sql:ro
    env_file: .env
    environment:
      POSTGRES_DB: mcticket
    ports:
      - 127.0.0.1:5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d mcticket"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - 127.0.0.1:8081:8080

  frontend:
    build: ./frontend
    restart: always
    ports:
      - 127.0.0.1:80:80

  seaweedfs-master:
    image: chrislusf/seaweedfs:4.32
    restart: always
    environment:
      IP: seaweedfs-master
      PORT: 9333
    command: master
    volumes:
      - seaweedfs_master:/data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:4.32
    restart: always
    environment:
      IP: seaweedfs-volume
      PORT: 8080
      MSERVER: seaweedfs-master:9333
      DIR: /data
      MAX: 100
    command: volume
    volumes:
      - seaweedfs_volume:/data
    depends_on:
      - seaweedfs-master

  seaweedfs-filer:
    image: chrislusf/seaweedfs:4.32
    restart: always
    environment:
      MASTER: seaweedfs-master:9333
      PORT: 8888
    command: filer
    volumes:
      - seaweedfs_filer:/data
    depends_on:
      - seaweedfs-master

  seaweedfs-s3:
    image: chrislusf/seaweedfs:4.32
    restart: always
    environment:
      PORT: 8333
      FILER: seaweedfs-filer:8888
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_SECRET_KEY}
    command: s3
    depends_on:
      - seaweedfs-filer

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_started
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mcticket
      NLP_BASE_URL: http://nlp:8000
      CORS_ALLOWED_ORIGINS: http://localhost:4200

  nlp:
    build: ./nlp
    restart: always
    ports:
      - 127.0.0.1:8000:8000
    volumes:
      - nlp_models:/app/models

volumes:
  pgdata:
  nlp_models:
  seaweedfs_master:
  seaweedfs_volume:
  seaweedfs_filer:
