spring.application.name=mc-ticket

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=helpdesk

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# NLP
app.nlp.base-url=${NLP_BASE_URL}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# File storage
app.storage.upload-dir=${UPLOAD_DIR}
app.storage.max-file-size=${APP_MAX_FILE_SIZE:10485760}

# Multipart (10MB in DataSize format)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
