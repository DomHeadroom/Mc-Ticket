spring.application.name=mc-ticket

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=helpdesk

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# NLP
app.nlp.base-url=${NLP_BASE_URL}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# File storage (S3 object storage via SeaweedFS)
app.storage.max-file-size=${APP_MAX_FILE_SIZE:10485760}
app.storage.s3.endpoint=${APP_S3_ENDPOINT}
app.storage.s3.access-key=${SEAWEEDFS_ACCESS_KEY}
app.storage.s3.secret-key=${SEAWEEDFS_SECRET_KEY}
app.storage.s3.bucket=${APP_S3_BUCKET:mcticket-attachments}
app.storage.s3.region=us-east-1

# Multipart (10MB in DataSize format)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
